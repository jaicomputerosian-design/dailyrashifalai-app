# Nginx Configuration for DailyRashifalai.com

server {
    listen 80;
    server_name dailyrashifalai.com www.dailyrashifalai.com;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dailyrashifalai.com www.dailyrashifalai.com;

    # SSL Certificates (Generated via Certbot)
    ssl_certificate /etc/letsencrypt/live/dailyrashifalai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyrashifalai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
